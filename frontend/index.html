<!doctype html>
<html lang="en">
  <head>
    <!-- Basic -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Title (very important for SEO) -->
    <title>
      Natural Plus Ayurveda | Authentic Ayurvedic Products & Herbal Remedies
    </title>

    <!-- SEO Meta Description -->
    <meta
      name="description"
      content="Natural Plus Ayurveda offers authentic Ayurvedic products, herbal oils, natural remedies and wellness solutions made using traditional Ayurvedic formulations. Discover pure and natural healing."
    />

    <!-- Keywords (less important but still useful) -->
    <meta
      name="keywords"
      content="Ayurveda products, natural remedies, herbal oils, Ayurvedic medicine, natural plus ayurveda, ayurvedic wellness products, herbal treatment, ayurvedic health"
    />

    <!-- Author -->
    <meta name="author" content="Natural Plus Ayurveda" />

    <!-- Robots -->
    <meta name="robots" content="index, follow" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/img/favicon-2.png" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://naturalplusayurveda.com/" />

    <!-- Open Graph (for Facebook, WhatsApp sharing) -->
    <meta property="og:title" content="Natural Plus Ayurveda" />
    <meta
      property="og:description"
      content="Discover authentic Ayurvedic products, herbal oils and natural wellness solutions from Natural Plus Ayurveda."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://naturalplusayurveda.com" />
    <meta property="og:image" content="https://naturalplusayurveda.com/img/logo.png" />

    <!-- Twitter SEO -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Natural Plus Ayurveda" />
    <meta
      name="twitter:description"
      content="Authentic Ayurvedic products and natural herbal remedies for better health and wellness."
    />
    <meta name="twitter:image" content="https://naturalplusayurveda.com/img/logo.png" />

    <!-- Theme color for mobile -->
    <meta name="theme-color" content="#166534" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
